# n8n virtual-host configuration
# Replace every occurrence of "n8n.example.com" with your actual domain.
# TLS certificates are expected in /etc/nginx/certs/ (mounted from ./nginx/certs/).
# If you use Certbot / Let's Encrypt, adjust cert paths accordingly.

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name n8n.example.com;

    # Allow ACME http-01 challenges (Certbot / Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name n8n.example.com;

    # TLS
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # Modern TLS settings (Mozilla Intermediate)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS (1 year; adjust after testing)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy to n8n main container
    location / {
        proxy_pass         http://n8n-main:5678;
        proxy_http_version 1.1;

        # WebSocket support (required for n8n real-time UI)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        # Timeouts — long-running workflows must not be cut off
        proxy_connect_timeout  60s;
        proxy_send_timeout     3600s;
        proxy_read_timeout     3600s;

        # Disable buffering for Server-Sent Events / streaming responses
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
    }

    # Healthcheck endpoint — used by external monitors and load balancers
    location /healthz {
        proxy_pass http://n8n-main:5678/healthz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }
}
